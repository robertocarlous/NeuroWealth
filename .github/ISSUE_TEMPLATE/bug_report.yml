name: Bug Report
description: Report incorrect behavior, regressions, or broken flows in the frontend
title: "[Bug] "
labels:
  - bug
  - frontend
body:
  - type: markdown
    attributes:
      value: |
        Use this template for reproducible defects. Search existing issues before filing.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One or two sentences describing what went wrong.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Numbered steps. Include route or screen name.
      placeholder: |
        1. Go to …
        2. Click …
        3. …
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, viewport or device, and branch or deployment if relevant.
      placeholder: |
        - Browser:
        - OS:
        - Viewport / device:
        - Branch / URL:

  - type: textarea
    id: logs
    attributes:
      label: Screenshots / console / network
      description: Paste errors, screenshots, or HAR notes. Redact secrets.

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true

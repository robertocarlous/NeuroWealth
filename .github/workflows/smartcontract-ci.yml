name: Smart Contract CI

on:
  push:
    branches: [main, master]
    paths:
      - "smartcontract/**"
      - ".github/workflows/smartcontract-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "smartcontract/**"
      - ".github/workflows/smartcontract-ci.yml"

jobs:
  ci:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smartcontract/neurowealth-vault

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            smartcontract/neurowealth-vault/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('smartcontract/neurowealth-vault/Cargo.lock') }}

      - name: Test
        run: cargo test -p neurowealth-vault

      - name: Build Soroban contract (wasm32 release)
        run: cargo build -p neurowealth-vault --target wasm32-unknown-unknown --release

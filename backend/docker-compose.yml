version: '3'

services:
  db:
    image: postgres:14.4
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    container_name: ${DB_CONTAINER_NAME}
    volumes:
      - ./postgres:/var/lib/postgresql/data

  prometheus:
    image: prom/prometheus:latest
    restart: always
    ports:
      - "9090:9090"
    # The backend runs on the host (outside this compose stack), not as a
    # service here — scrape it via host.docker.internal.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./deploy/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./deploy/monitoring/prometheus/alert-rules.yaml:/etc/prometheus/alert-rules.yaml

  grafana:
    image: grafana/grafana:latest
    restart: always
    ports:
      - "3300:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./deploy/monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./deploy/monitoring/grafana/dashboards:/etc/grafana/dashboards
    depends_on:
      - prometheus
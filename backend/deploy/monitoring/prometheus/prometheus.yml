# Local dev Prometheus config. Run via `docker-compose up prometheus grafana`
# from backend/ while the backend itself runs on the host (npm run dev).
global:
  scrape_interval: 10s

scrape_configs:
  - job_name: neurowealth-backend
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:3001"]
    http_headers:
      # Must match INTERNAL_SERVICE_TOKEN in backend/.env — /metrics is
      # gated by internalAuthGuardStrict (see src/middleware/authGuard.ts).
      X-Internal-Token:
        values: ["local-dev-internal-token"]

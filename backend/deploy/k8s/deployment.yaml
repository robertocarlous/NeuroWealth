apiVersion: apps/v1
kind: Deployment
metadata:
  name: neurowealth-backend
  namespace: neurowealth
  labels:
    app.kubernetes.io/name: neurowealth-backend
    app.kubernetes.io/component: api
spec:
  # IMPORTANT: The monolith starts an in-process Stellar event listener and
  # agent cron loop. Multiple replicas will duplicate event processing and
  # scheduled jobs. Keep replicas at 1 until worker/API split is implemented.
  # See docs/DEPLOYMENT.md for scaling guidance.
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: neurowealth-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: neurowealth-backend
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: neurowealth-backend
      securityContext:
        runAsNonRoot: true
        fsGroup: 1000
      terminationGracePeriodSeconds: 35
      initContainers:
        - name: migrate
          image: neurowealth-backend:latest
          imagePullPolicy: IfNotPresent
          command: ["npx", "prisma", "migrate", "deploy"]
          envFrom:
            - secretRef:
                name: neurowealth-secrets
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
      containers:
        - name: api
          image: neurowealth-backend:latest
          imagePullPolicy: IfNotPresent
          # Do NOT run migrations in the app container — initContainer handles that.
          command: ["node", "dist/index.js"]
          ports:
            - name: http
              containerPort: 3001
              protocol: TCP
          envFrom:
            - configMapRef:
                name: neurowealth-config
            - secretRef:
                name: neurowealth-secrets
          livenessProbe:
            httpGet:
              path: /health/live
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/ready
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL

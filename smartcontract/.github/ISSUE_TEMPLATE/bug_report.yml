name: Bug Report
description: Report a defect in the smart contract or related systems
title: "Bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before submitting, check [SECURITY.md](../SECURITY.md) — security vulnerabilities must be reported privately, not via issues.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: dropdown
    id: network
    attributes:
      label: Soroban Network
      description: Which network did you encounter this bug on?
      options:
        - Devnet (local development)
        - Testnet (public test network)
        - Mainnet (production)
    validations:
      required: true

  - type: input
    id: contract_id
    attributes:
      label: Contract ID
      description: The contract address where the bug occurs.
      placeholder: "CAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAABSC4"

  - type: input
    id: contract_function
    attributes:
      label: Contract Function
      description: Which function is affected?
      placeholder: "e.g. deposit, withdraw, rebalance"

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the issue.
      placeholder: |
        1. 
        2. 
        3. 
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: test_output
    attributes:
      label: Test Command Output
      description: Paste the full output of `cargo test` or `stellar contract invoke`. Include the command you ran.
      render: shell
    validations:
      required: true

  - type: input
    id: rust_version
    attributes:
      label: Rust Version
      placeholder: "rustc --version output"

  - type: input
    id: stellar_cli_version
    attributes:
      label: Stellar CLI Version
      placeholder: "stellar --version output"

  - type: input
    id: tx_hash
    attributes:
      label: Transaction Hash (if on-chain)
      placeholder: "Optional — paste hash for StellarExpert lookup"

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have run `cargo fmt` and `cargo clippy`
          required: false
        - label: I have run the full test suite (`cargo test`)
          required: false
        - label: This is NOT a security issue (security issues go to SECURITY.md)
          required: true
        - label: I have reviewed [CONTRIBUTING.md](../CONTRIBUTING.md)
          required: false

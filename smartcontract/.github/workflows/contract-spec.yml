name: Contract Spec Generation & Validation

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'neurowealth-vault/contracts/vault/src/**'
      - 'scripts/generate-spec.py'
      - 'scripts/validate-spec.py'
      - 'scripts/generate-client.js'
      - '.github/workflows/contract-spec.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'neurowealth-vault/contracts/vault/src/**'
      - 'contract-spec.json'
      - 'scripts/generate-spec.py'
      - 'scripts/validate-spec.py'
      - 'scripts/generate-client.js'
      - 'packages/vault-client/src/generated/vault.ts'
  workflow_dispatch:

jobs:
  generate-and-validate-spec:
    name: Generate & Validate Contract Spec
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      
      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: 🔧 Generate contract specification
        run: |
          echo "Generating contract specification from Soroban contract..."
          python3 scripts/generate-spec.py
      
      - name: ✅ Validate contract specification
        run: |
          echo "Validating specification against contract implementation..."
          echo "Local equivalent: python3 scripts/validate-spec.py"
          python3 scripts/validate-spec.py

      - name: 🔬 Detect parameter and error-shape drift
        run: |
          echo "Checking event field names and VaultError codes for drift..."
          echo "Local equivalent: python3 scripts/validate-spec.py"
          python3 scripts/validate-spec.py
          echo "✅ No parameter or error-shape drift detected"

      - name: 📊 Check spec completeness
        run: |
          echo "Checking specification completeness..."
          python3 << 'EOF'
          import json
          
          with open('contract-spec.json') as f:
              spec = json.load(f)
          
          functions = spec.get('functions', [])
          events = spec.get('events', [])
          errors = spec.get('errors', {})
          
          print(f"📋 Functions: {len(functions)}")
          print(f"📢 Events: {len(events)}")
          print(f"❌ Error codes: {len(errors)}")
          
          # Check for documented functions
          state_changing = [f for f in functions if f.get('state_changing')]
          read_only = [f for f in functions if not f.get('state_changing')]
          
          print(f"   ├─ State-changing: {len(state_changing)}")
          print(f"   └─ Query functions: {len(read_only)}")
          
          # Check for categories
          categories = set(f.get('category', 'uncategorized') for f in functions)
          print(f"📂 Categories: {', '.join(sorted(categories))}")
          
          # Summary
          total_items = len(functions) + len(events)
          documented_items = sum(1 for f in functions if 'description' in f) + \
                            sum(1 for e in events if 'description' in e)
          
          coverage = (documented_items / total_items * 100) if total_items > 0 else 0
          print(f"\n📈 Documentation coverage: {coverage:.1f}%")
          EOF
      
      - name: 🟦 Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🔧 Generate TypeScript client
        run: |
          echo "Generating TypeScript client from contract-spec.json..."
          node scripts/generate-client.js

      - name: 🔍 Check TypeScript client is up-to-date
        if: github.event_name == 'pull_request'
        run: |
          echo "Checking that generated TypeScript client matches current spec..."
          if git diff --quiet packages/vault-client/src/generated/vault.ts; then
            echo "✅ TypeScript client is up-to-date"
          else
            echo ""
            echo "❌ Generated TypeScript client is stale!"
            echo ""
            echo "The file packages/vault-client/src/generated/vault.ts does not match"
            echo "what would be generated from the current contract-spec.json."
            echo ""
            echo "Run the following command and commit the result:"
            echo "  node scripts/generate-client.js"
            echo ""
            git diff packages/vault-client/src/generated/vault.ts
            exit 1
          fi

      - name: 📦 Upload spec as artifact
        uses: actions/upload-artifact@v4
        with:
          name: contract-spec
          path: |
            contract-spec.json
            packages/vault-client/src/generated/vault.ts
          retention-days: 30
      
      - name: 💾 Commit spec if changed
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          if git diff --quiet contract-spec.json; then
            echo "✅ Spec unchanged"
          else
            echo "📝 Spec updated, committing changes..."
            git add contract-spec.json
            git commit -m "chore: update contract specification [skip ci]"
            git push
          fi

          if git diff --quiet packages/vault-client/src/generated/vault.ts; then
            echo "✅ TypeScript client unchanged"
          else
            echo "📝 TypeScript client updated, committing changes..."
            git add packages/vault-client/src/generated/vault.ts
            git commit -m "chore: regenerate TypeScript vault client [skip ci]"
            git push
          fi
      
      - name: 📋 Comment PR with spec summary
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const spec = JSON.parse(fs.readFileSync('contract-spec.json', 'utf8'));
            
            const functions = spec.functions?.length || 0;
            const events = spec.events?.length || 0;
            const errors = Object.keys(spec.errors || {}).length;
            
            const body = `## 📋 Contract Specification Summary

            | Metric | Count |
            |--------|-------|
            | Functions | ${functions} |
            | Events | ${events} |
            | Error Types | ${errors} |
            | Spec Version | ${spec.version} |
            
            ✅ Spec generation and validation completed successfully!
            🟦 TypeScript client regenerated at \`packages/vault-client/src/generated/vault.ts\`
            
            [Download full spec](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
